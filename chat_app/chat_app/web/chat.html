<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>채팅</title>
<link rel="stylesheet" href="/chat.css">
</head>
<body>
  <div id="lobby">
    <h1>채팅방 로비</h1>
    <div id="lobbyTabs">
      <button id="myRoomsTabBtn" class="lobby-tab active" type="button">내 채팅방</button>
      <button id="findRoomsTabBtn" class="lobby-tab" type="button">채팅방 찾기</button>
    </div>

    <div id="myRoomsPanel">
      <div id="myRoomList"></div>
    </div>

    <div id="findRoomsPanel" class="hidden">
      <div id="roomSearchBar">
        <input id="roomSearchInput" type="text" placeholder="채팅방 이름 검색" autocomplete="off">
        <button id="roomSearchBtn">검색</button>
        <button id="roomSearchClearBtn">전체 목록</button>
      </div>
      <div id="roomList"></div>
      <button id="showCreateRoomBtn">새 채팅방 만들기</button>
    </div>
  </div>

  <div id="createRoom" class="hidden">
    <h1>채팅방 만들기</h1>
    <input id="newRoomName" type="text" placeholder="채팅방 이름" maxlength="30" autocomplete="off">
    <div class="radio-row">
      <label><input type="radio" name="visibility" value="public" checked> 공개</label>
      <label><input type="radio" name="visibility" value="private"> 비공개</label>
    </div>
    <label class="checkbox-row"><input id="newRoomHasPassword" type="checkbox"> 비밀번호 설정</label>
    <input id="newRoomPassword" type="password" placeholder="비밀번호" class="hidden" autocomplete="off">
    <div id="createRoomError" class="form-error"></div>
    <div class="form-btn-row">
      <button id="createRoomBackBtn">뒤로가기</button>
      <button id="createRoomSubmitBtn">만들기</button>
    </div>
  </div>

  <div id="passwordPrompt" class="hidden">
    <h1>비밀번호 입력</h1>
    <p id="passwordPromptRoomName"></p>
    <input id="roomPasswordInput" type="password" placeholder="비밀번호" autocomplete="off">
    <div id="passwordError" class="form-error"></div>
    <div class="form-btn-row">
      <button id="passwordBackBtn">뒤로가기</button>
      <button id="passwordSubmitBtn">입장</button>
    </div>
  </div>

  <div id="nicknameEntry" class="hidden">
    <h1>닉네임 설정</h1>
    <p id="nicknameEntryRoomName"></p>
    <input id="roomUsernameInput" type="text" placeholder="닉네임" maxlength="20" autocomplete="off">
    <div id="nicknameError" class="form-error"></div>
    <div class="form-btn-row">
      <button id="nicknameBackBtn">뒤로가기</button>
      <button id="nicknameSubmitBtn">입장</button>
    </div>
  </div>

  <div id="chat" class="hidden">
    <div id="chatRoomHeader">
      <button id="backToLobbyBtn" type="button" title="뒤로가기">←</button>
      <span id="chatRoomName"></span>
      <button id="leaveRoomBtn" type="button" title="채팅방 나가기">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
          <polyline points="16 17 21 12 16 7"></polyline>
          <line x1="21" y1="12" x2="9" y2="12"></line>
        </svg>
      </button>
    </div>
    <div id="pinnedPopup" class="hidden">
      <span id="pinnedPopupIcon">📌</span>
      <div id="pinnedPopupBody">
        <div id="pinnedPopupSender"></div>
        <div id="pinnedPopupPreview"></div>
      </div>
      <button id="pinnedUnpinBtn" type="button" title="고정 해제" class="hidden">✕</button>
    </div>
    <div id="mentionToasts"></div>
    <div id="logWrapper">
      <div id="log"></div>
      <div id="dropOverlay" class="hidden">파일을 여기에 놓으세요</div>
      <button id="scrollToBottomBtn" class="hidden" type="button" title="맨 아래로">↓</button>
    </div>
    <div id="colorPalette" class="hidden"></div>
    <div id="emojiPanel" class="hidden"></div>
    <div id="mentionPopup" class="hidden"></div>
    <div id="replyPreview" class="hidden">
      <div id="replyPreviewText"></div>
      <button id="replyPreviewCancel" type="button" title="답장 취소">✕</button>
    </div>
    <div id="inputBar">
      <div id="toolButtons">
        <button id="paletteBtn" class="tool-btn" type="button" title="닉네임 색상">🎨</button>
        <button id="emojiBtn" class="tool-btn" type="button" title="이모티콘">😀</button>
      </div>
      <textarea id="msgInput" rows="3" placeholder="메시지를 입력하세요"></textarea>
      <button id="sendBtn">전송</button>
    </div>
  </div>

  <div id="messageContextMenu" class="hidden">
    <button id="ctxEditBtn" type="button">메시지 수정하기</button>
    <button id="ctxPinBtn" type="button">메시지 상단에 고정하기</button>
    <button id="ctxReactBtn" type="button">이모티콘으로 반응하기</button>
    <button id="ctxDeleteBtn" type="button">메시지 삭제하기</button>
  </div>

  <div id="reactionPicker" class="hidden"></div>

  <div id="roomContextMenu" class="hidden">
    <button id="markReadBtn" type="button">안읽음 모두 읽음으로 표시</button>
  </div>

  <div id="globalRoomToasts"></div>

  <div id="filePreviewModal" class="hidden">
    <div id="filePreviewBackdrop"></div>
    <div id="filePreviewBox">
      <div id="filePreviewHeader">
        <span id="filePreviewName"></span>
        <button id="filePreviewCloseBtn" type="button" title="닫기">✕</button>
      </div>
      <div id="filePreviewBody"></div>
      <div id="filePreviewFooter">
        <a id="filePreviewDownloadBtn" href="#" download>다운로드</a>
      </div>
    </div>
  </div>

  <script src="/chat.js"></script>
</body>
</html>
